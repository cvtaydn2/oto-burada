name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run weekly on Mondays at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  audit:
    name: NPM Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run security audit
        run: npm audit --audit-level=critical
        continue-on-error: true
        id: audit
      
      - name: Generate audit report
        if: always()
        run: |
          echo "## Security Audit Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          npm audit --json > audit-report.json || true
          
          # Extract summary
          CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' audit-report.json)
          HIGH=$(jq '.metadata.vulnerabilities.high // 0' audit-report.json)
          MODERATE=$(jq '.metadata.vulnerabilities.moderate // 0' audit-report.json)
          LOW=$(jq '.metadata.vulnerabilities.low // 0' audit-report.json)
          
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Critical | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
          echo "| High | $HIGH |" >> $GITHUB_STEP_SUMMARY
          echo "| Moderate | $MODERATE |" >> $GITHUB_STEP_SUMMARY
          echo "| Low | $LOW |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$CRITICAL" -gt 0 ]; then
            echo "🔴 **Critical vulnerabilities found!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Free Tier Notice**: Deployment will continue, but please review and fix ASAP." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Action Items:**" >> $GITHUB_STEP_SUMMARY
            echo "1. Run \`npm audit\` locally" >> $GITHUB_STEP_SUMMARY
            echo "2. Review \`DEPENDENCY_SECURITY_FIX.md\`" >> $GITHUB_STEP_SUMMARY
            echo "3. Apply fixes when possible" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Known Issues:**" >> $GITHUB_STEP_SUMMARY
            echo "- \`iyzipay\` has transitive vulnerabilities (no fix available)" >> $GITHUB_STEP_SUMMARY
            echo "- Some dependencies require major version updates" >> $GITHUB_STEP_SUMMARY
          elif [ "$HIGH" -gt 0 ]; then
            echo "🟡 **High severity vulnerabilities found**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please review when possible. Run \`npm audit\` for details." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No critical or high severity vulnerabilities found." >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: audit-report.json
          retention-days: 30
      
      - name: Comment on vulnerabilities (non-blocking)
        if: always()
        run: |
          npm audit --json > audit-report.json || true
          CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' audit-report.json)
          
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::warning::Critical security vulnerabilities found. Please review npm audit output."
            echo "::notice::Deployment continues for free tier. Review DEPENDENCY_SECURITY_FIX.md for guidance."
          fi

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: critical  # Only fail on critical (was: moderate)
          deny-licenses: GPL-3.0, AGPL-3.0
        continue-on-error: true  # Don't block PRs on free tier

