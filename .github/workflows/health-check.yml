name: Production Health Check

on:
  schedule:
    # Her gün saat 03:00 UTC'de çalış (Hobby plan limiti: günde 1 kez)
    - cron: '0 3 * * *'
  
  # Manuel tetikleme için
  workflow_dispatch:
  
  # Her push'ta da çalıştır (opsiyonel)
  # push:
  #   branches: [main]

jobs:
  health-check:
    name: Check Production Health
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run diagnostic script
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          SUPABASE_STORAGE_BUCKET_LISTINGS: ${{ secrets.SUPABASE_STORAGE_BUCKET_LISTINGS }}
        run: npm run diagnose
      
      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🚨 Production Health Check Failed';
            const body = `
            ## Health Check Failure
            
            **Time:** ${new Date().toISOString()}
            **Workflow:** [${context.workflow}](${context.payload.repository.html_url}/actions/runs/${context.runId})
            
            ### Action Required
            
            1. Check the [workflow logs](${context.payload.repository.html_url}/actions/runs/${context.runId})
            2. Run \`npm run diagnose\` locally
            3. Review [Production Troubleshooting Guide](docs/PRODUCTION_TROUBLESHOOTING.md)
            
            ### Common Issues
            
            - Supabase Email Provider disabled
            - Environment variables missing
            - Database migrations not applied
            - Email rate limit exceeded (4/hour free tier)
            
            ### Quick Fix
            
            See [Quick Fix Guide](docs/PRODUCTION_QUICK_FIX.md) for 5-minute solutions.
            `;
            
            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'health-check,automated'
            });
            
            if (issues.data.length === 0) {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['health-check', 'automated', 'bug']
              });
            } else {
              // Comment on existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `Health check failed again at ${new Date().toISOString()}\n\nSee [workflow logs](${context.payload.repository.html_url}/actions/runs/${context.runId})`
              });
            }
      
      - name: Close issue on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            // Find open health-check issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'health-check,automated'
            });
            
            // Close them
            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ Health check passed at ${new Date().toISOString()}. Closing this issue.`
              });
            }
