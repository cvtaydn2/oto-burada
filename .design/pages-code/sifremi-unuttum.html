<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OtoBurada - Şifremi Unuttum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex flex-col justify-center items-center">

    <a href="/" class="text-blue-500 text-3xl font-bold flex items-center mb-8">
        <i class="fa-solid fa-car-side mr-2"></i>OtoBurada
    </a>

    <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-8 w-full max-w-md">
        
        <div class="w-16 h-16 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center text-2xl mx-auto mb-6">
            <i class="fa-solid fa-key"></i>
        </div>

        <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">Şifrenizi mi Unuttunuz?</h1>
        <p class="text-sm text-gray-500 text-center mb-8">Endişelenmeyin. Kayıtlı e-posta adresinizi girin, size şifrenizi sıfırlamanız için bir bağlantı gönderelim.</p>

        <form class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-gray-700 mb-2">E-posta Adresi</label>
                <div class="relative">
                    <i class="fa-regular fa-envelope absolute left-4 top-3.5 text-gray-400"></i>
                    <input type="email" placeholder="ornek@mail.com" class="w-full border border-gray-200 text-gray-800 rounded-xl pl-11 p-3 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition">
                </div>
            </div>

            <button type="button" class="w-full bg-blue-500 text-white font-bold rounded-xl px-4 py-3.5 hover:bg-blue-600 transition shadow-md">
                Sıfırlama Bağlantısı Gönder
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="giris.html" class="text-sm font-bold text-gray-500 hover:text-blue-500 transition flex items-center justify-center">
                <i class="fa-solid fa-arrow-left mr-2"></i> Giriş Ekranına Dön
            </a>
        </div>
    </div>

    <div class="mt-8 text-xs text-gray-400">
        © 2026 OtoBurada A.Ş. Güvenli Bağlantı.
    </div>

</body>
</html>
