<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OtoBurada - Güvenli Ödeme</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <div class="max-w-[1100px] mx-auto px-4 py-12">
        <div class="flex items-center justify-between mb-10">
            <a href="/" class="text-blue-500 text-2xl font-bold flex items-center">
                <i class="fa-solid fa-car-side mr-2"></i>OtoBurada
            </a>
            <div class="flex items-center text-gray-400 text-sm">
                <i class="fa-solid fa-lock mr-2 text-green-500"></i> 256-bit SSL Güvenli Ödeme
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white rounded-2xl p-8 shadow-sm border border-gray-100">
                    <h2 class="text-xl font-bold mb-6 flex items-center">
                        <i class="fa-regular fa-credit-card mr-3 text-blue-500"></i> Kart Bilgileri
                    </h2>
                    
                    <form class="space-y-5">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Kart Üzerindeki İsim</label>
                            <input type="text" placeholder="AD SOYAD" class="w-full border border-gray-200 rounded-xl p-3 focus:border-blue-500 outline-none transition">
                        </div>
                        
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Kart Numarası</label>
                            <div class="relative">
                                <input type="text" placeholder="0000 0000 0000 0000" class="w-full border border-gray-200 rounded-xl p-3 focus:border-blue-500 outline-none transition pr-12">
                                <i class="fa-brands fa-cc-visa absolute right-4 top-3.5 text-2xl text-gray-300"></i>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Son Kullanma</label>
                                <input type="text" placeholder="AA / YY" class="w-full border border-gray-200 rounded-xl p-3 focus:border-blue-500 outline-none transition">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">CVV</label>
                                <input type="text" placeholder="123" class="w-full border border-gray-200 rounded-xl p-3 focus:border-blue-500 outline-none transition">
                            </div>
                        </div>

                        <div class="pt-4">
                            <label class="flex items-start cursor-pointer">
                                <input type="checkbox" class="mt-1 w-4 h-4 text-blue-500 border-gray-300 rounded focus:ring-blue-500">
                                <span class="ml-3 text-xs text-gray-500 leading-relaxed">
                                    <a href="#" class="text-blue-500 underline">Mesafeli Satış Sözleşmesi</a>'ni ve <a href="#" class="text-blue-500 underline">Ödeme Şartları</a>'nı okudum, onaylıyorum.
                                </span>
                            </label>
                        </div>
                    </form>
                </div>

                <div class="flex items-center justify-between p-4 bg-blue-50 rounded-xl border border-blue-100">
                    <div class="flex items-center text-blue-700 text-sm">
                        <i class="fa-solid fa-shield-halved mr-3 text-lg"></i>
                        Ödemeniz iyzico altyapısı ile güvence altındadır.
                    </div>
                    <img src="https://www.iyzico.com/assets/images/logo.svg" class="h-5 opacity-50" alt="iyzico">
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 sticky top-6">
                    <h3 class="font-bold text-gray-800 mb-4 pb-4 border-b border-gray-50">Sipariş Özeti</h3>
                    
                    <div class="space-y-4 mb-6">
                        <div class="flex justify-between items-start text-sm">
                            <div>
                                <div class="font-bold text-gray-700">Turbo Doping Paketi</div>
                                <div class="text-gray-400 text-xs mt-0.5">7 Günlük Kategori Üst Sıra</div>
                            </div>
                            <span class="font-bold text-gray-700">₺249,00</span>
                        </div>
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-gray-500">Hizmet Bedeli</span>
                            <span class="text-gray-500">₺0,00</span>
                        </div>
                    </div>

                    <div class="pt-4 border-t border-gray-100 mb-6">
                        <div class="flex justify-between items-center">
                            <span class="text-lg font-bold text-gray-800">Toplam</span>
                            <span class="text-2xl font-extrabold text-blue-500">₺249,00</span>
                        </div>
                        <p class="text-[10px] text-gray-400 mt-1 text-right">KDV Dahildir</p>
                    </div>

                    <button class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 rounded-xl transition shadow-lg flex justify-center items-center">
                        Ödemeyi Tamamla
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
